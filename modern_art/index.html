<!DOCTYPE html>
<html>
<head>
<title>VR Modern Art Gallery</title>

<link rel="stylesheet" href="style.css">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

</head>

<body>

<a-scene>

<!-- Assets -->
<a-assets>
<img id="art1" src="images/art1.jpg">
<img id="art2" src="images/art2.jpg">
<img id="art3" src="images/art3.jpg">
</a-assets>

<!-- Floor -->
<a-plane rotation="-90 0 0" width="20" height="20" color="#222"></a-plane>

<!-- Walls -->
<a-box position="0 2 -8" width="16" height="4" depth="0.2" color="#ffffff"></a-box>
<a-box position="-8 2 0" width="0.2" height="4" depth="16" color="#ffffff"></a-box>
<a-box position="8 2 0" width="0.2" height="4" depth="16" color="#ffffff"></a-box>

<!-- Paintings -->
<a-plane src="#art1" position="-4 2 -7.9" width="3" height="2"></a-plane>
<a-plane src="#art2" position="0 2 -7.9" width="3" height="2"></a-plane>
<a-plane src="#art3" position="4 2 -7.9" width="3" height="2"></a-plane>

<!-- Light -->
<a-light type="ambient" color="#ccc"></a-light>
<a-light type="point" position="0 4 0" intensity="1"></a-light>

<!-- Camera -->
<a-entity camera position="0 1.6 4" look-controls wasd-controls></a-entity>

</a-scene>

</body>
</html>

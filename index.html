<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>VR Art Gallery - Young Innovators STEM Lab</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      border-radius: 5px;
      max-width: 300px;
      font-size: 14px;
      z-index: 100;
    }
    #info h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }
    #info p {
      margin: 5px 0;
    }
  </style>
</head>

<body>
  <div id="info">
    <h2>Welcome to VR Art Gallery</h2>
    <p>Use your VR controller or mouse to explore the gallery.</p>
    <p id="current-art">Move around to see artworks</p>
  </div>

  <a-scene>
    <!-- Environment Setup -->
    <a-assets>
      <img id="mona-lisa" src="pictures/mona_lisa.jpg" crossorigin="anonymous">
      <img id="girl-pearl" src="pictures/girl_with_pearl_earring.jpg" crossorigin="anonymous">
      <img id="last-supper" src="pictures/the_last_supper.jpg" crossorigin="anonymous">
      <img id="the-scream" src="pictures/the_scream.png" crossorigin="anonymous">
    </a-assets>

    <!-- Sky and Ground -->
    <a-sky color="#1a1a2e"></a-sky>
    <a-plane position="0 -1.5 0" rotation="-90 0 0" width="50" height="50" color="#2d2d44"></a-plane>

    <!-- Lighting -->
    <a-light type="ambient" color="#fff" intensity="0.6"></a-light>
    <a-light type="directional" color="#fff" intensity="0.8" position="5 10 10"></a-light>
    <a-light type="point" color="#ff6b6b" intensity="0.5" position="-10 5 -10"></a-light>
    <a-light type="point" color="#4ecdc4" intensity="0.5" position="10 5 10"></a-light>

    <!-- Gallery Walls -->
    <a-plane position="0 0 -20" width="40" height="15" color="#16213e"></a-plane>
    <a-plane position="-20 0 0" rotation="0 90 0" width="40" height="15" color="#0f3460"></a-plane>
    <a-plane position="20 0 0" rotation="0 90 0" width="40" height="15" color="#0f3460"></a-plane>
    <a-plane position="0 0 20" width="40" height="15" color="#16213e"></a-plane>

    <!-- Gallery Title -->
    <a-text value="YOUNG INNOVATORS" position="0 6 -19.5" align="center" color="#ff6b6b" 
      font="mozillavr" width="15" height="5" anchor="center" scale="1.5 1.5 1.5"></a-text>
    <a-text value="ART GALLERY" position="0 5 -19.5" align="center" color="#4ecdc4" 
      font="mozillavr" width="15" height="5" anchor="center" scale="1.2 1.2 1.2"></a-text>

    <!-- Art Piece 1: Mona Lisa -->
    <a-plane position="-8 2 -15" width="5" height="6" material="src: #mona-lisa"></a-plane>
    <a-text value="Mona Lisa" position="-8 -1 -14.9" align="center" color="#fff" 
      font="mozillavr" width="6" height="2" anchor="center" scale="0.6 0.6 0.6"></a-text>
    <a-text value="Leonardo da Vinci, 1503-1519" position="-8 -1.8 -14.9" align="center" color="#aaa" 
      font="mozillavr" width="7" height="2" anchor="center" scale="0.4 0.4 0.4"></a-text>

    <!-- Art Piece 2: Girl with Pearl Earring -->
    <a-plane position="8 2 -15" width="5" height="6" material="src: #girl-pearl"></a-plane>
    <a-text value="Girl with Pearl Earring" position="8 -1 -14.9" align="center" color="#fff" 
      font="mozillavr" width="6" height="2" anchor="center" scale="0.6 0.6 0.6"></a-text>
    <a-text value="Johannes Vermeer, 1665" position="8 -1.8 -14.9" align="center" color="#aaa" 
      font="mozillavr" width="7" height="2" anchor="center" scale="0.4 0.4 0.4"></a-text>

    <!-- Art Piece 3: The Last Supper -->
    <a-plane position="-15 2 0" rotation="0 90 0" width="5" height="6" material="src: #last-supper"></a-plane>
    <a-text value="The Last Supper" position="-14.9 -1 0" rotation="0 90 0" align="center" color="#fff" 
      font="mozillavr" width="6" height="2" anchor="center" scale="0.6 0.6 0.6"></a-text>
    <a-text value="Leonardo da Vinci, 1495-1498" position="-14.9 -1.8 0" rotation="0 90 0" align="center" color="#aaa" 
      font="mozillavr" width="7" height="2" anchor="center" scale="0.4 0.4 0.4"></a-text>

    <!-- Art Piece 4: The Scream -->
    <a-plane position="15 2 0" rotation="0 90 0" width="5" height="6" material="src: #the-scream"></a-plane>
    <a-text value="The Scream" position="14.9 -1 0" rotation="0 90 0" align="center" color="#fff" 
      font="mozillavr" width="6" height="2" anchor="center" scale="0.6 0.6 0.6"></a-text>
    <a-text value="Edvard Munch, 1893" position="14.9 -1.8 0" rotation="0 90 0" align="center" color="#aaa" 
      font="mozillavr" width="7" height="2" anchor="center" scale="0.4 0.4 0.4"></a-text>

    <!-- Center Pedestal with Rotating Sculpture -->
    <a-entity id="pedestal" position="0 0 0">
      <a-box position="0 0 0" width="3" height="0.5" depth="3" color="#4ecdc4"></a-box>
      <a-box position="0 1.5 0" width="2" height="2" depth="2" color="#ff6b6b" animation="property: rotation; to: 0 360 0; dur: 8000; easing: linear; loop: true"></a-box>
      <a-octahedron position="0 3 0" scale="0.8 0.8 0.8" color="#ffd93d" animation="property: position; to: 0 3.5 0; dur: 2000; easing: easeInOutQuad; loop: true; dir: alternate"></a-octahedron>
    </a-entity>

    <!-- Camera with Controller Support -->
    <a-entity camera look-controls wasd-controls position="0 1.6 5">
      <a-cursor></a-cursor>
    </a-entity>

  </a-scene>

  <script>
    // Gallery info updates
    const infoElement = document.getElementById('current-art');
    const artpieces = [
      { title: 'Mona Lisa', desc: 'Leonardo da Vinci, 1503-1519' },
      { title: 'Girl with Pearl Earring', desc: 'Johannes Vermeer, 1665' },
      { title: 'The Last Supper', desc: 'Leonardo da Vinci, 1495-1498' },
      { title: 'The Scream', desc: 'Edvard Munch, 1893' }
    ];

    // Update info based on camera position periodically
    setInterval(() => {
      const camera = document.querySelector('[camera]');
      const pos = camera.getAttribute('position');
      
      let closest = 0;
      let minDist = Infinity;
      const positions = [[-8, 0, -15], [8, 0, -15], [-15, 0, 0], [15, 0, 0]];
      
      positions.forEach((p, i) => {
        const dist = Math.sqrt(Math.pow(pos.x - p[0], 2) + Math.pow(pos.z - p[2], 2));
        if (dist < minDist) {
          minDist = dist;
          closest = i;
        }
      });
      
      if (minDist < 10) {
        infoElement.innerHTML = `<strong>${artpieces[closest].title}</strong><br>${artpieces[closest].desc}`;
      }
    }, 500);
  </script>
</body>

</html>

```html
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>European Art Room - VR Gallery</title>

<script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>

</head>

<body>

<a-scene>

<!-- Assets -->
<a-assets>
<img id="monaLisaImg" src="mona_lisa.jpg">
<img id="starryNightImg" src="starry_night.jpg">
<img id="theScreamImg" src="the_scream.jpg">
<img id="lastSupperImg" src="last_sup.jpg">
<img id="nightWatchImg" src="night_watch.jpg">
</a-assets>

<!-- Camera -->
<a-entity camera look-controls position="0 1.6 10">
<a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
</a-entity>

<!-- European museum lighting -->
<a-entity light="type: ambient; intensity: 0.6; color:#FFF2CC"></a-entity>
<a-entity light="type: point; intensity: 1.3; distance: 40; color:#FFE8B0" position="0 5 0"></a-entity>

<!-- Wooden floor -->
<a-plane position="0 0 0"
rotation="-90 0 0"
width="40"
height="20"
color="#8B5A2B">
</a-plane>

<!-- Back wall (cream museum wall) -->
<a-box position="0 2 -10"
width="40"
height="4"
depth="0.2"
color="#F5F0E6">
</a-box>

<!-- Left wall -->
<a-box position="-20 2 0"
width="0.2"
height="4"
depth="20"
color="#F5F0E6">
</a-box>

<!-- Right wall -->
<a-box position="20 2 0"
width="0.2"
height="4"
depth="20"
color="#F5F0E6">
</a-box>

<!-- Ceiling -->
<a-box position="0 4 0"
width="40"
height="0.2"
depth="20"
color="#D9D3C7">
</a-box>

<!-- Title background -->
<a-plane
position="0 3.6 -9.6"
width="9"
height="1.3"
color="#E8E2D6">
</a-plane>

<!-- Title -->
<a-text
value="European Art Room"
position="0 3.6 -9.5"
color="#3B2F2F"
align="center"
width="14"
scale="1.6 1.6 1.6"
font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
</a-text>



<!-- MONA LISA -->
<a-plane class="clickable"
src="#monaLisaImg"
position="-12 2 -9.8"
width="2"
height="2.5"

event-set__click="_target: #info-panel; visible: true;
_target: #info-title; value: Mona Lisa;
_target: #info-artist; value: Leonardo da Vinci;
_target: #info-year; value: 1503;
_target: #info-desc; value: One of the most famous paintings in the world.">
</a-plane>

<a-box position="-12 2 -9.9" width="2.2" height="2.7" depth="0.03" color="#4B2E1E"></a-box>



<!-- STARRY NIGHT -->
<a-plane class="clickable"
src="#starryNightImg"
position="-6 2 -9.8"
width="2"
height="2.5"

event-set__click="_target: #info-panel; visible: true;
_target: #info-title; value: The Starry Night;
_target: #info-artist; value: Vincent van Gogh;
_target: #info-year; value: 1889;
_target: #info-desc; value: A famous depiction of a swirling night sky.">
</a-plane>

<a-box position="-6 2 -9.9" width="2.2" height="2.7" depth="0.03" color="#4B2E1E"></a-box>



<!-- THE SCREAM -->
<a-plane class="clickable"
src="#theScreamImg"
position="0 2 -9.8"
width="2"
height="2.5"

event-set__click="_target: #info-panel; visible: true;
_target: #info-title; value: The Scream;
_target: #info-artist; value: Edvard Munch;
_target: #info-year; value: 1893;
_target: #info-desc; value: A famous expressionist painting showing anxiety.">
</a-plane>

<a-box position="0 2 -9.9" width="2.2" height="2.7" depth="0.03" color="#4B2E1E"></a-box>



<!-- LAST SUPPER -->
<a-plane class="clickable"
src="#lastSupperImg"
position="6 2 -9.8"
width="2"
height="2.5"

event-set__click="_target: #info-panel; visible: true;
_target: #info-title; value: The Last Supper;
_target: #info-artist; value: Leonardo da Vinci;
_target: #info-year; value: 1498;
_target: #info-desc; value: Depicts Jesus and his disciples at their final meal.">
</a-plane>

<a-box position="6 2 -9.9" width="2.2" height="2.7" depth="0.03" color="#4B2E1E"></a-box>



<!-- NIGHT WATCH -->
<a-plane class="clickable"
src="#nightWatchImg"
position="12 2 -9.8"
width="2"
height="2.5"

event-set__click="_target: #info-panel; visible: true;
_target: #info-title; value: The Night Watch;
_target: #info-artist; value: Rembrandt;
_target: #info-year; value: 1642;
_target: #info-desc; value: A dramatic group portrait of a Dutch militia.">
</a-plane>

<a-box position="12 2 -9.9" width="2.2" height="2.7" depth="0.03" color="#4B2E1E"></a-box>



<!-- Info panel -->
<a-entity id="info-panel" visible="false" position="0 2 -7">

<a-plane width="4" height="2.5" color="#2C1F1A" opacity="0.95"></a-plane>

<a-text id="info-title" position="0 0.9 0.01" align="center" color="#FFF8E7" width="3"></a-text>
<a-text id="info-artist" position="0 0.4 0.01" align="center" color="#FFF8E7" width="3"></a-text>
<a-text id="info-year" position="0 0.1 0.01" align="center" color="#FFF8E7" width="3"></a-text>
<a-text id="info-desc" position="0 -0.6 0.01" align="center" color="#FFF8E7" width="3"></a-text>

</a-entity>

<a-plane position="0 2 -7"
width="4"
height="2.5"
opacity="0"
event-set__click="_target: #info-panel; visible: false">
</a-plane>

</a-scene>

</body>
</html>
```
